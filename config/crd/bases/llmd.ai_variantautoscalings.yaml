    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VariantAutoscaling is the Schema for the variantautoscalings API.
          It represents the autoscaling configuration and status for a model variant.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired state for autoscaling the model
              variant.
            properties:
              behavior:
                description: |-
                  Behavior configures the HPA scaling behavior policies (scale-up and scale-down).
                  When omitted, default Kubernetes HPA scaling behavior is used.
                  Applied directly to HPA, or passed through to KEDA's underlying HPA via
                  spec.advanced.horizontalPodAutoscalerConfig.behavior.
                properties:
                  scaleDown:
                    description: |-
                      scaleDown is scaling policy for scaling Down.
                      If not set, the default value is to allow to scale down to minReplicas pods, with a
                      300 second stabilization window (i.e., the highest recommendation for
                      the last 300sec is used).
                    properties:
                      policies:
                        description: |-
                          policies is a list of potential scaling polices which can be used during scaling.
                          If not set, use the default values:
                          - For scale up: allow doubling the number of pods, or an absolute change of 4 pods in a 15s window.
                          - For scale down: allow all pods to be removed in a 15s window.
                        items:
                          description: HPAScalingPolicy is a single policy which must
                            hold true for a specified past interval.
                          properties:
                            periodSeconds:
                              description: |-
                                periodSeconds specifies the window of time for which the policy should hold true.
                                PeriodSeconds must be greater than zero and less than or equal to 1800 (30 min).
                              format: int32
                              type: integer
                            type:
                              description: type is used to specify the scaling policy.
                              type: string
                            value:
                              description: |-
                                value contains the amount of change which is permitted by the policy.
                                It must be greater than zero
                              format: int32
                              type: integer
                          required:
                          - periodSeconds
                          - type
                          - value
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      selectPolicy:
                        description: |-
                          selectPolicy is used to specify which policy should be used.
                          If not set, the default value Max is used.
                        type: string
                      stabilizationWindowSeconds:
                        description: |-
                          stabilizationWindowSeconds is the number of seconds for which past recommendations should be
                          considered while scaling up or scaling down.
                          StabilizationWindowSeconds must be greater than or equal to zero and less than or equal to 3600 (one hour).
                          If not set, use the default values:
                          - For scale up: 0 (i.e. no stabilization is done).
                          - For scale down: 300 (i.e. the stabilization window is 300 seconds long).
                        format: int32
                        type: integer
                      tolerance:
                        anyOf:
                        - type: integer
                        - type: string
                        description: |-
                          tolerance is the tolerance on the ratio between the current and desired
                          metric value under which no updates are made to the desired number of
                          replicas (e.g. 0.01 for 1%). Must be greater than or equal to zero. If not
                          set, the default cluster-wide tolerance is applied (by default 10%).

                          For example, if autoscaling is configured with a memory consumption target of 100Mi,
                          and scale-down and scale-up tolerances of 5% and 1% respectively, scaling will be
                          triggered when the actual consumption falls below 95Mi or exceeds 101Mi.

                          This is an alpha field and requires enabling the HPAConfigurableTolerance
                          feature gate.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    type: object
                  scaleUp:
                    description: |-
                      scaleUp is scaling policy for scaling Up.
                      If not set, the default value is the higher of:
                        * increase no more than 4 pods per 60 seconds
                        * double the number of pods per 60 seconds
                      No stabilization is used.
                    properties:
                      policies:
                        description: |-
                          policies is a list of potential scaling polices which can be used during scaling.
                          If not set, use the default values:
                          - For scale up: allow doubling the number of pods, or an absolute change of 4 pods in a 15s window.
                          - For scale down: allow all pods to be removed in a 15s window.
                        items:
                          description: HPAScalingPolicy is a single policy which must
                            hold true for a specified past interval.
                          properties:
                            periodSeconds:
                              description: |-
                                periodSeconds specifies the window of time for which the policy should hold true.
                                PeriodSeconds must be greater than zero and less than or equal to 1800 (30 min).
                              format: int32
                              type: integer
                            type:
                              description: type is used to specify the scaling policy.
                              type: string
                            value:
                              description: |-
                                value contains the amount of change which is permitted by the policy.
                                It must be greater than zero
                              format: int32
                              type: integer
                          required:
                          - periodSeconds
                          - type
                          - value
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      selectPolicy:
                        description: |-
                          selectPolicy is used to specify which policy should be used.
                          If not set, the default value Max is used.
                        type: string
                      stabilizationWindowSeconds:
                        description: |-
                          stabilizationWindowSeconds is the number of seconds for which past recommendations should be
                          considered while scaling up or scaling down.
                          StabilizationWindowSeconds must be greater than or equal to zero and less than or equal to 3600 (one hour).
                          If not set, use the default values:
                          - For scale up: 0 (i.e. no stabilization is done).
                          - For scale down: 300 (i.e. the stabilization window is 300 seconds long).
                        format: int32
                        type: integer
                      tolerance:
                        anyOf:
                        - type: integer
                        - type: string
                        description: |-
                          tolerance is the tolerance on the ratio between the current and desired
                          metric value under which no updates are made to the desired number of
                          replicas (e.g. 0.01 for 1%). Must be greater than or equal to zero. If not
                          set, the default cluster-wide tolerance is applied (by default 10%).

                          For example, if autoscaling is configured with a memory consumption target of 100Mi,
                          and scale-down and scale-up tolerances of 5% and 1% respectively, scaling will be
                          triggered when the actual consumption falls below 95Mi or exceeds 101Mi.

                          This is an alpha field and requires enabling the HPAConfigurableTolerance
                          feature gate.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    type: object
                type: object
              maxReplicas:
                default: 2
                description: |-
                  MaxReplicas is the upper bound on the number of replicas for this variant.
                  The autoscaler will never scale beyond this value regardless of load.
                format: int32
                minimum: 1
                type: integer
              minReplicas:
                default: 1
                description: |-
                  MinReplicas is the lower bound on the number of replicas for this variant.
                  A value of 0 enables scale-to-zero when the model is idle.
                  Defaults to 1, preserving existing behavior for VAs that omit this field.
                format: int32
                minimum: 0
                type: integer
              modelID:
                description: ModelID specifies the unique identifier of the model
                  to be autoscaled.
                minLength: 1
                type: string
              scaleTargetRef:
                description: |-
                  ScaleTargetRef references the scalable resource to manage.
                  This follows the same pattern as HorizontalPodAutoscaler.
                properties:
                  apiVersion:
                    description: apiVersion is the API version of the referent
                    type: string
                  kind:
                    description: 'kind is the kind of the referent; More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
                    type: string
                  name:
                    description: 'name is the name of the referent; More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names'
                    type: string
                required:
                - kind
                - name
                type: object
              variantCost:
                default: "10.0"
                description: VariantCost specifies the cost per replica for this variant
                  (used in saturation analysis).
                pattern: ^\d+(\.\d+)?$
                type: string
            required:
            - maxReplicas
            - modelID
            - scaleTargetRef
            type: object
            x-kubernetes-validations:
            - message: minReplicas must be less than or equal to maxReplicas
              rule: '!has(self.minReplicas) || self.minReplicas <= self.maxReplicas'
          status:
            description: Status represents the current status of autoscaling for the
              model variant.
            properties:
              actuation:
                description: Actuation provides details about the actuation process
                  and its current status.
                properties:
                  applied:
                    description: Applied indicates whether the actuation was successfully
                      applied.
                    type: boolean
                required:
